<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MAGNETMAZE - Gameplay</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",

                extend: {
                    "colors": {
                        "surface-tint": "#00dce5",

                        "inverse-primary": "#00696e",
                        "on-secondary-fixed-variant": "#840076",
                        "outline": "#849495",
                        "tertiary-container": "#b3f100",
                        "background": "#12131c",
                        "surface-dim": "#12131c",
                        "surface-container": "#1e1f29",
                        "primary-fixed": "#63f7ff",
                        "on-surface": "#e3e1ef",
                        "on-error": "#690005",
                        "secondary-fixed-dim": "#fface8",
                        "error-container": "#93000a",
                        "surface-container-high": "#282933",
                        "secondary": "#fface8",
                        "on-secondary-container": "#520049",
                        "surface-container-highest": "#33343e",
                        "surface-container-low": "#1a1b24",
                        "on-tertiary": "#253600",
                        "inverse-on-surface": "#2f303a",
                        "inverse-surface": "#e3e1ef",
                        "on-tertiary-fixed-variant": "#374e00",
                        "on-background": "#e3e1ef",
                        "on-secondary": "#5e0053",
                        "primary-fixed-dim": "#00dce5",
                        "on-secondary-fixed": "#3a0033",
                        "secondary-fixed": "#ffd7f0",
                        "surface": "#12131c",
                        "error": "#ffb4ab",
                        "outline-variant": "#3a494a",
                        "on-tertiary-fixed": "#141f00",
                        "primary": "#e9feff",
                        "on-primary": "#003739",
                        "surface-container-lowest": "#0d0e17",
                        "on-primary-fixed-variant": "#004f53",
                        "on-tertiary-container": "#4d6a00",
                        "tertiary-fixed": "#b7f700",
                        "secondary-container": "#ff24e4",
                        "surface-bright": "#383843",
                        "tertiary-fixed-dim": "#a0d800",
                        "surface-variant": "#33343e"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",

                    "spacing": {
                        "xs": "4px",
                        "unit": "4px",
                        "margin-desktop": "32px",

                        "sm": "8px",

                    "fontFamily": {

<style>
        .grid-bg {
            background-image: 
                linear-gradient(to right, rgba(0, 220, 229, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 220, 229, 0.05) 1px, transparent 1px);
            background-size: 32px 32px;
        }
        .neon-glow-cyan {
            box-shadow: 0 0 10px rgba(0, 220, 229, 0.8), inset 0 0 10px rgba(0, 220, 229, 0.5);
        }
        .neon-glow-magenta {
            box-shadow: 0 0 10px rgba(255, 36, 228, 0.8), inset 0 0 10px rgba(255, 36, 228, 0.5);
        }
        .scanline {
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px;
        }
        
        @keyframes pulse-cyan {
            0% { box-shadow: 0 0 10px rgba(0, 220, 229, 0.5); }
            50% { box-shadow: 0 0 20px rgba(0, 220, 229, 1); }
            100% { box-shadow: 0 0 10px rgba(0, 220, 229, 0.5); }
        }
        .animate-glow-pulse-cyan {
            animation: pulse-cyan 2s infinite;
        }

        @keyframes pulse-magenta {
            0% { box-shadow: 0 0 10px rgba(255, 36, 228, 0.5); }
            50% { box-shadow: 0 0 20px rgba(255, 36, 228, 1); }
            100% { box-shadow: 0 0 10px rgba(255, 36, 228, 0.5); }
        }
        .animate-glow-pulse-magenta {
            animation: pulse-magenta 2s infinite;
        }
    </style>
</head>
<body class="bg-background text-on-background h-screen w-screen overflow-hidden relative">
<!-- The Void & Grid -->
<div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-surface-container to-background z-0"></div>
<div class="absolute inset-0 grid-bg z-0"></div>
<div class="absolute inset-0 scanline z-50 pointer-events-none opacity-30"></div>
<!-- TopAppBar HUD -->
<header class="bg-transparent flex justify-between items-center px-margin-desktop md:px-margin-desktop px-margin-mobile pt-sm w-full z-50 fixed top-0 w-full flat no shadows">
<div class="flex items-center gap-md">
<h1 class="font-display-arcade-mobile text-display-arcade-mobile text-primary-fixed drop-shadow-[0_0_10px_rgba(0,220,229,0.8)] hidden md:block">MAGNETMAZE</h1>
<h1 class="font-display-arcade-mobile text-headline-lg text-primary-fixed drop-shadow-[0_0_10px_rgba(0,220,229,0.8)] md:hidden">MM</h1>
<div class="flex gap-sm ml-lg bg-surface-container/20 backdrop-blur-xl border border-outline-variant/30 rounded-lg p-sm">
<div class="flex flex-col items-center px-sm">
<span class="font-label-caps text-label-caps text-outline">LVL</span>
<span class="font-headline-md text-headline-md text-primary-fixed">01</span>
</div>
<div class="w-px bg-outline-variant/50"></div>
<div class="flex flex-col items-center px-sm">
<span class="font-label-caps text-label-caps text-outline">SCORE</span>
<span class="font-headline-md text-headline-md text-primary-fixed">1250</span>
</div>
</div>
</div>
<div class="flex items-center gap-lg">
<div class="flex gap-xs">
<span class="material-symbols-outlined text-secondary-container drop-shadow-[0_0_5px_rgba(255,36,228,0.8)]" style="font-variation-settings: 'FILL' 1;">favorite</span>
<span class="material-symbols-outlined text-secondary-container drop-shadow-[0_0_5px_rgba(255,36,228,0.8)]" style="font-variation-settings: 'FILL' 1;">favorite</span>
<span class="material-symbols-outlined text-secondary-container drop-shadow-[0_0_5px_rgba(255,36,228,0.8)]" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
<div class="flex items-center gap-xs bg-surface-container/20 backdrop-blur-xl border border-outline-variant/30 rounded-full px-md py-xs">
<span class="material-symbols-outlined text-tertiary-fixed drop-shadow-[0_0_5px_rgba(183,247,0,0.8)]" style="font-variation-settings: 'FILL' 1;">bolt</span>
<span class="font-headline-md text-headline-md text-tertiary-fixed">1/3</span>
</div>
<div class="flex gap-sm">
<button class="p-xs text-outline-variant hover:text-primary-fixed hover:drop-shadow-[0_0_8px_rgba(0,220,229,0.6)] transition-all">
<span class="material-symbols-outlined">restart_alt</span>
</button>
<button class="p-xs text-outline-variant hover:text-primary-fixed hover:drop-shadow-[0_0_8px_rgba(0,220,229,0.6)] transition-all">
<span class="material-symbols-outlined">pause</span>
</button>
<button class="p-xs text-outline-variant hover:text-primary-fixed hover:drop-shadow-[0_0_8px_rgba(0,220,229,0.6)] transition-all">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</div>
</header>
<!-- Playfield Center -->
<main class="absolute inset-0 flex items-center justify-center z-10 pt-xl">
<!-- Aspect Ratio Container for Maze -->
<div class="relative w-[90vw] h-[90vw] max-w-[600px] max-h-[600px] md:w-[716px] md:h-[716px] bg-surface-container/20 backdrop-blur-md border border-outline-variant/30 rounded-xl overflow-hidden shadow-[0_0_30px_rgba(0,220,229,0.1)]">
<!-- Maze Structure (Simplified Abstraction) -->
<div class="absolute inset-0 p-lg">
<!-- Outer Walls -->
<div class="absolute top-md left-md right-md h-2 bg-surface-tint/50 neon-glow-cyan rounded-full"></div>
<div class="absolute bottom-md left-md right-md h-2 bg-surface-tint/50 neon-glow-cyan rounded-full"></div>
<div class="absolute top-md bottom-md left-md w-2 bg-surface-tint/50 neon-glow-cyan rounded-full"></div>
<div class="absolute top-md bottom-md right-md w-2 bg-surface-tint/50 neon-glow-cyan rounded-full"></div>
<!-- Inner Walls -->
<div class="absolute top-1/4 left-1/4 right-1/2 h-2 bg-surface-tint/30 rounded-full"></div>
<div class="absolute top-1/2 left-1/2 bottom-1/4 w-2 bg-surface-tint/30 rounded-full"></div>
<!-- Moving Hazard -->
<div class="absolute top-1/3 right-1/4 w-2 h-1/4 bg-error-container neon-glow-magenta rounded-full animate-pulse"></div>
<!-- Collectible Core -->
<div class="absolute bottom-1/4 left-1/3 w-6 h-6 bg-tertiary-fixed rounded-full drop-shadow-[0_0_15px_rgba(183,247,0,0.8)] animate-bounce flex items-center justify-center">
<div class="w-3 h-3 bg-white rounded-full"></div>
</div>
<!-- Exit Portal -->
<div class="absolute top-1/4 right-1/4 w-12 h-12 border-4 border-dashed border-white rounded-full animate-spin flex items-center justify-center drop-shadow-[0_0_10px_rgba(255,255,255,0.8)]">
<div class="w-6 h-6 bg-white/50 rounded-full blur-sm"></div>
</div>
<!-- Player Orb -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-8 h-8 bg-surface-tint rounded-full animate-glow-pulse-cyan flex items-center justify-center z-20 transition-all duration-300">
<div class="w-4 h-4 bg-white rounded-full blur-[2px]"></div>
</div>
</div>
<!-- Start Game Overlay (Hidden state represented) -->
<!-- <div class="absolute inset-0 bg-background/80 backdrop-blur-sm flex flex-col items-center justify-center z-30">
                <button class="bg-primary-container text-on-primary-container font-headline-lg text-headline-lg px-xl py-md rounded-full neon-glow-cyan hover:scale-105 transition-transform">START GAME</button>
            </div> -->
</div>
</main>
<!-- Bottom Controls (Polarity Toggle) -->
<div class="absolute bottom-lg left-1/2 -translate-x-1/2 z-40 flex flex-col items-center gap-sm">
<span class="font-label-caps text-label-caps text-outline tracking-widest">POLARITY</span>
<!-- Toggle Container -->
<div class="relative w-48 h-12 bg-surface-container-highest rounded-full border border-outline-variant/50 p-1 flex cursor-pointer shadow-inner overflow-hidden">
<!-- Background Indicator (Active State) -->
<div class="absolute inset-0 w-1/2 right-0 bg-secondary-container/20 rounded-r-full pointer-events-none transition-all duration-300"></div>
<!-- Labels -->
<div class="flex-1 flex items-center justify-center z-10 font-label-caps text-label-caps text-outline">ATTRACT</div>
<div class="flex-1 flex items-center justify-center z-10 font-label-caps text-label-caps text-white font-bold drop-shadow-[0_0_5px_rgba(255,36,228,0.8)]">REPEL</div>
<!-- Thumb / Puck -->
<div class="absolute top-1 right-1 w-[calc(50%-4px)] h-10 bg-secondary-container rounded-full animate-glow-pulse-magenta border border-white/30 z-20 transition-all duration-300 flex items-center justify-center">
<span class="material-symbols-outlined text-white text-sm" style="font-variation-settings: 'FILL' 1;">wifi_tethering</span>
</div>
</div>
</div>
</body></html>
